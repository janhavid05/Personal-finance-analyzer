<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Finance Analyzer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container glass">
        <h2>Create Account</h2>
        <p class="subtitle">Start managing your finances today</p>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password (Alphanumeric + chars)</label>
                <input type="password" id="password" required placeholder="Create a strong password">
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <p class="switch-auth">Already have an account? <a href="index.html">Login</a></p>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
